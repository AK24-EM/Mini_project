<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Risk Analysis | Fitness Intelligence</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
            min-height: 100vh;
            padding: 2rem 0;
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
        }

        .back-link {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .main-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-header-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 3rem 2rem;
            text-align: center;
        }

        .card-header-gradient h2 {
            font-weight: 700;
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: -0.025em;
        }

        .form-label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 0.5rem;
            color: var(--primary);
            width: 16px;
        }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: white;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: white;
        }

        .form-control::placeholder {
            color: #475569;
        }

        .btn-predict {
            background: white;
            color: var(--dark);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: #f1f5f9;
        }

        .result-container {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            background: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group-text {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: #64748b;
            border-radius: 12px 0 0 12px;
        }

        .form-control-with-icon {
            border-radius: 0 12px 12px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <a href="/" class="back-link">
                    <i class="fas fa-arrow-left me-2"></i>Dashboard
                </a>

                <div class="main-card">
                    <div class="card-header-gradient">
                        <div class="mb-3">
                            <i class="fas fa-microscope fa-3x"></i>
                        </div>
                        <h2>Health Risk Analysis</h2>
                        <p class="mb-0 text-white-50">Precision biometrics evaluation via K-Means Clustering</p>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form action="/cluster_predict" method="post">
                            <div class="row g-4">
                                <!-- Personal Metrics -->
                                <div class="col-md-4">
                                    <label for="age" class="form-label"><i class="fas fa-calendar"></i>Age</label>
                                    <input type="number" step="any" class="form-control" id="age" name="age"
                                        placeholder="Years" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="weight" class="form-label"><i class="fas fa-weight-hanging"></i>Weight
                                        (kg)</label>
                                    <input type="number" step="any" class="form-control" id="weight" name="weight"
                                        placeholder="kg" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="height" class="form-label"><i class="fas fa-ruler-vertical"></i>Height
                                        (m)</label>
                                    <input type="number" step="any" class="form-control" id="height" name="height"
                                        placeholder="m" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="bmi" class="form-label"><i class="fas fa-calculator"></i>BMI</label>
                                    <input type="number" step="any" class="form-control" id="bmi" name="bmi"
                                        placeholder="Body Mass Index" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="fat" class="form-label"><i class="fas fa-percent"></i>Fat %</label>
                                    <input type="number" step="any" class="form-control" id="fat" name="fat"
                                        placeholder="Percentage" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="resting_bpm" class="form-label"><i class="fas fa-heart"></i>Resting
                                        BPM</label>
                                    <input type="number" step="any" class="form-control" id="resting_bpm"
                                        name="resting_bpm" placeholder="Beats per min" required>
                                </div>

                                <!-- Activity Metrics -->
                                <div class="col-md-4">
                                    <label for="avg_bpm" class="form-label"><i class="fas fa-wave-square"></i>Avg
                                        BPM</label>
                                    <input type="number" step="any" class="form-control" id="avg_bpm" name="avg_bpm"
                                        placeholder="Workout Average" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="max_bpm" class="form-label"><i class="fas fa-fire-alt"></i>Max
                                        BPM</label>
                                    <input type="number" step="any" class="form-control" id="max_bpm" name="max_bpm"
                                        placeholder="Workout Peak" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="session_dur" class="form-label"><i class="fas fa-stopwatch"></i>Duration
                                        (hr)</label>
                                    <input type="number" step="any" class="form-control" id="session_dur"
                                        name="session_dur" placeholder="Session time" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="frequency" class="form-label"><i class="fas fa-redo"></i>Frequency
                                        (days/wk)</label>
                                    <input type="number" step="any" class="form-control" id="frequency" name="frequency"
                                        placeholder="Weekly sessions" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="experience" class="form-label"><i class="fas fa-medal"></i>Exp Level
                                        (1-3)</label>
                                    <input type="number" step="any" class="form-control" id="experience"
                                        name="experience" placeholder="Junior to Expert" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-predict">Execution Analysis</button>
                            </div>
                        </form>

                        {% if result %}
                        <div class="result-container">
                            <span class="result-badge">AI CLASSIFICATION STATUS</span>
                            <p class="result-text">{{ result }}</p>
                        </div>
                        {% endif %}
                    </div>
                </div>

                <div class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
                    <p><i class="fas fa-info-circle me-1"></i>Models are trained on normalized synthetic datasets for
                        predictive accuracy.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
