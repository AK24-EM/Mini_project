<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Fitness Predictor</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1.5rem;
            text-align: center;
        }

        .card-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }

        .list-group-item {
            border: none;
            padding: 1rem 1.5rem;
            background-color: #f8f9fa;
            margin-bottom: 0.5rem;
            border-radius: 10px !important;
            transition: transform 0.2s;
        }

        .list-group-item:hover {
            transform: translateX(5px);
            background-color: #e9ecef;
        }

        .list-group-item a {
            text-decoration: none;
            color: #495057;
            font-weight: 500;
            display: block;
        }

        .list-group-item a:hover {
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h1>🏋️ Health & Fitness Predictor</h1>
                        <p class="mb-0">Select a prediction tool</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="list-group">
                            <div class="list-group-item">
                                <a href="/cluster">🔬 Health Risk Clustering (K‑Means)</a>
                                <small class="d-block text-muted">Assess your health risk level based on personal
                                    metrics</small>
                            </div>
                            <div class="list-group-item">
                                <a href="/regression">🔥 Calorie Burn Prediction (Linear Regression)</a>
                                <small class="d-block text-muted">Estimate calories burned during a workout
                                    session</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
