<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Burn Prediction</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
        }

        .card-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1.5rem;
            text-align: center;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .form-label {
            font-weight: 500;
            color: #495057;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #ced4da;
            padding: 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            background: linear-gradient(45deg, #764ba2, #667eea);
        }

        .result-alert {
            border-radius: 10px;
            margin-top: 1rem;
        }

        fieldset {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        legend {
            width: auto;
            padding: 0 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h2>🔥 Calorie Burn Prediction</h2>
                        <p class="mb-0">Enter your personal and workout details</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="/regression_predict" method="post">
                            <fieldset>
                                <legend>Personal & Session</legend>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="age" class="form-label">Age</label>
                                        <input type="number" step="any" class="form-control" id="age" name="age"
                                            placeholder="e.g. 30" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="gender" class="form-label">Gender (0=Female, 1=Male)</label>
                                        <input type="number" step="any" class="form-control" id="gender" name="gender"
                                            placeholder="0 or 1" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="weight" class="form-label">Weight (kg)</label>
                                        <input type="number" step="any" class="form-control" id="weight" name="weight"
                                            placeholder="e.g. 75" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="height" class="form-label">Height (m)</label>
                                        <input type="number" step="any" class="form-control" id="height" name="height"
                                            placeholder="e.g. 1.75" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="bmi" class="form-label">BMI</label>
                                        <input type="number" step="any" class="form-control" id="bmi" name="bmi"
                                            placeholder="e.g. 24.5" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="fat" class="form-label">Fat Percentage</label>
                                        <input type="number" step="any" class="form-control" id="fat" name="fat"
                                            placeholder="e.g. 20" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="resting_bpm" class="form-label">Resting BPM</label>
                                        <input type="number" step="any" class="form-control" id="resting_bpm"
                                            name="resting_bpm" placeholder="e.g. 60" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="avg_bpm" class="form-label">Average BPM</label>
                                        <input type="number" step="any" class="form-control" id="avg_bpm" name="avg_bpm"
                                            placeholder="e.g. 140" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="max_bpm" class="form-label">Max BPM</label>
                                        <input type="number" step="any" class="form-control" id="max_bpm" name="max_bpm"
                                            placeholder="e.g. 180" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="session_dur" class="form-label">Session Duration (hours)</label>
                                        <input type="number" step="any" class="form-control" id="session_dur"
                                            name="session_dur" placeholder="e.g. 1.2" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="frequency" class="form-label">Workout Frequency (days/week)</label>
                                        <input type="number" step="any" class="form-control" id="frequency"
                                            name="frequency" placeholder="e.g. 4" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="experience" class="form-label">Experience Level (1-3)</label>
                                        <input type="number" step="any" class="form-control" id="experience"
                                            name="experience" placeholder="e.g. 2" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="water" class="form-label">Water Intake (liters)</label>
                                        <input type="number" step="any" class="form-control" id="water" name="water"
                                            placeholder="e.g. 2.5" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="meals" class="form-label">Daily Meals</label>
                                        <input type="number" step="any" class="form-control" id="meals" name="meals"
                                            placeholder="e.g. 3" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="carbs" class="form-label">Carbs (g)</label>
                                        <input type="number" step="any" class="form-control" id="carbs" name="carbs"
                                            placeholder="e.g. 250" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="proteins" class="form-label">Proteins (g)</label>
                                        <input type="number" step="any" class="form-control" id="proteins"
                                            name="proteins" placeholder="e.g. 100" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="fats" class="form-label">Fats (g)</label>
                                        <input type="number" step="any" class="form-control" id="fats" name="fats"
                                            placeholder="e.g. 70" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="calories_diet" class="form-label">Dietary Calories</label>
                                        <input type="number" step="any" class="form-control" id="calories_diet"
                                            name="calories_diet" placeholder="e.g. 2000" required>
                                    </div>
                                </div>
                            </fieldset>

                            <fieldset>
                                <legend>Workout Type</legend>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="cardio" class="form-label">Cardio (0/1)</label>
                                        <input type="number" step="any" class="form-control" id="cardio" name="cardio"
                                            value="0" required>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="hiit" class="form-label">HIIT (0/1)</label>
                                        <input type="number" step="any" class="form-control" id="hiit" name="hiit"
                                            value="0" required>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="strength" class="form-label">Strength (0/1)</label>
                                        <input type="number" step="any" class="form-control" id="strength"
                                            name="strength" value="0" required>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="yoga" class="form-label">Yoga (0/1)</label>
                                        <input type="number" step="any" class="form-control" id="yoga" name="yoga"
                                            value="0" required>
                                    </div>
                                </div>
                            </fieldset>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Predict Calories</button>
                            </div>
                        </form>

                        {% if result %}
                        <div class="alert alert-success result-alert mt-4" role="alert">
                            <h5 class="alert-heading">Result</h5>
                            <p class="mb-0">{{ result }}</p>
                        </div>
                        {% endif %}

                        <div class="text-center mt-3">
                            <a href="/" class="text-decoration-none">← Back to Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
